[project]
name = "教学大纲四要点核心内容提取系统"
version = "1.0.0"
debug = true

[chunking]
chunk_size = 10000
overlap = 1000
batch_size = 100

[concurrency]
# 同时处理的最大文档数
max_concurrent = 50
# 等待队列上限，超出后返回 429
max_queue = 1000

[database]
host = "localhost"
port = 54320
user = "postgres"
password = "Hz_edu123#"
name = "syllabus_db"
pool_size = 100
max_overflow = 50
pool_timeout = 30

[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = ""

[llm]
model = "doubao-seed-2-0-mini-260215"
base_url = "https://ark.cn-beijing.volces.com/api/v3"
max_tokens = 8192
temperature = 0

[embedding]
model = "BAAI/bge-m3"
# 硅基流动："https://api.siliconflow.cn/v1"
base_url = "http://10.80.5.25:3001/v1"
dimension = 1024
batch_size = 32

[rerank]
enabled = true
model = "qwen3-reranker-4b"
#base_url = "https://api.siliconflow.cn/v1"
base_url = "http://10.80.5.25:3000/v1"
threshold_for_rerank = 50

[lexicon_match]
default_min_score = 0.5
max_top = 20
