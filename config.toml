[project]
name = "教学大纲四要点核心内容提取系统"
version = "1.0.0"
debug = true

# LLM 配置已迁移至 .env 文件

[chunking]
chunk_size = 10000
overlap = 1000
batch_size = 100

[concurrency]
# 同时处理的最大文档数
max_concurrent = 10
# 等待队列上限，超出后返回 429
max_queue = 10

[database]
host = "localhost"
port = 54320
user = "postgres"
password = "Hz_edu123#"
name = "syllabus_db"

[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = ""
